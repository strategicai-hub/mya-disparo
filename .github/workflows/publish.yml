name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/gustavocastilho-hub/mya-disparo:latest

      - name: Deploy via API Portainer (Git Redeploy)
        env:
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          GITHUB_PAT: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PORTAINER_URL="https://91.98.64.92:9443"
          STACK_ID=STACK_ID_AQUI
          ENDPOINT_ID=1

          echo "Buscando variáveis de ambiente atuais da stack..."
          STACK_ENV=$(curl -k -s \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            "$PORTAINER_URL/api/stacks/$STACK_ID" | jq '.Env // []')

          echo "Disparando git redeploy no Portainer (mantém modo Repository)..."
          BODY=$(curl -k -s -w "\nHTTP_STATUS:%{http_code}" -X PUT \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            "$PORTAINER_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID" \
            -d "{\"pullImage\": true, \"prune\": false, \"repositoryAuthentication\": true, \"repositoryUsername\": \"gustavocastilho-hub\", \"repositoryPassword\": \"$GITHUB_PAT\", \"env\": $STACK_ENV}")

          RESPONSE=$(echo "$BODY" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "HTTP Status: $RESPONSE"
          echo "Response body: $(echo "$BODY" | grep -v HTTP_STATUS:)"
          if [ "$RESPONSE" = "200" ]; then
            echo "Portainer redeploy com sucesso!"
          else
            echo "Falha no redeploy. HTTP $RESPONSE"
            exit 1
          fi
